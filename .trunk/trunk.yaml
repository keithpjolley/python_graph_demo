# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - eslint
    - vale
    - semgrep
    - codespell
    - cspell
    - markdown-table-prettify
    - prettier
    - deno
  enabled:
    - biome@2.4.8
    - flake8@7.3.0
    - gitleaks@8.30.1
    - kube-linter@0.7.2
    - markdown-link-check@3.14.2
    - markdownlint-cli2@0.22.0
    - mypy@1.19.1
    - pre-commit-hooks@5.0.0
    - pylint@4.0.5
    - pyright@1.1.408
    - remark-lint@12.0.1
    - rome@12.1.3
    - ruff-nbqa@0.15.7
    - sourcery@1.43.0
    - trivy@0.69.3
    - trufflehog-git@3.94.0
    - trunk-toolbox@0.5.4
    - yapf@0.43.0
    - bandit@1.9.4
    - autopep8@2.3.2
    - isort@8.0.1
    - actionlint@1.7.11
    - renovate@43.86.1
    - taplo@0.10.0
    - black@26.3.1
    - checkov@3.2.510
    - git-diff-check
    - markdownlint@0.48.0
    - osv-scanner@2.3.3
    - oxipng@10.1.0
    - ruff@0.15.7
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - trufflehog@3.94.0
    - yamllint@1.38.0
  # This fails in github actions. Runs fine locally.  ¯\_(ツ)_/¯
  ignore:
   - linters:
       - black
     paths:
       - graphs.ipynb
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
